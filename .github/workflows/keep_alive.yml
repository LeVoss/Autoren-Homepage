name: App am Leben erhalten

on:
  schedule:
    # Alle 4 Stunden (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Sende Weckruf (Simulierter Besucher)
        run: |
          curl -L -v --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          --max-time 60 \
          --retry 3 \
          --retry-delay 10 \
          https://stefanroeser.streamlit.app/
